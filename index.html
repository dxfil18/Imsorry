<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise!</title>
    <style>
        /* Impostazioni generali della pagina e sfondo rosa aesthetic */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb6c1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #d6336c; /* Colore del testo rosa scuro */
        }

        /* Contenitore per gestire le transizioni */
        .view {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* Effetto carino di transizione "bouncy" */
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Stile del bottone */
        button {
            background-color: #fff0f5;
            color: #ff69b4;
            border: 2px solid #ffb6c1;
            padding: 15px 50px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 105, 180, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(255, 105, 180, 0.4);
        }

        /* Stati per nascondere il bottone */
        #btn-container {
            opacity: 1;
            transform: scale(1);
        }

        #btn-container.hide {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        /* Stati per mostrare il testo nascosto */
        #msg-container {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        #msg-container.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* Stili per le scritte */
        h1 {
            font-size: 40px;
            margin-bottom: 5px;
            color: #c2185b;
        }

        p {
            font-size: 18px;
            margin-top: 0;
            color: #d81b60;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="btn-container" class="view">
        <button onclick="svelaSorpresa()">premimi</button>
    </div>

    <div id="msg-container" class="view">
        <h1>sorry, i'm a dumbass</h1>
        <p>anche se forse mi è venuta un po' di tachicardia</p>
    </div>

    <script>
        function svelaSorpresa() {
            // Nasconde il bottone
            document.getElementById('btn-container').classList.add('hide');
            // Mostra il messaggio con l'effetto carino
            document.getElementById('msg-container').classList.add('show');
        }
    </script>

</body>
</html>
